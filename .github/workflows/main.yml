name: Ažuriraj Instagram Galeriju

on:
  schedule:
    - cron: '0 0 * * *' # Svaki dan u ponoć
  workflow_dispatch: # Ručno pokretanje

# Utišavanje Node 20 deprecation upozorenja prema GitHub uputama
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi repozitorij
        uses: actions/checkout@v4

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Pokreni skriptu za skidanje slika
        run: python update_feed.py

      - name: Spremi promjene na GitHub
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -A
          git commit -m "Automatsko ažuriranje novih postova" || exit 0
          git push
